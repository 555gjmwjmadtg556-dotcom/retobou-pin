<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>レト坊 新アイコン保存</title>
<style>
  body{margin:0;background:#0f1424;color:#fff;font-family:-apple-system,"Hiragino Sans",sans-serif;text-align:center;padding:24px 16px 60px}
  h1{font-size:20px;margin:8px 0 4px}
  p{font-size:15px;line-height:1.7;color:#cdd6e6;margin:6px 16px}
  .icon{width:78%;max-width:340px;border-radius:24px;margin:18px auto;display:block;box-shadow:0 6px 30px rgba(0,0,0,.5)}
  .hint{background:#1b2238;border-radius:14px;padding:14px 16px;margin:18px 12px;font-size:14px;color:#aebbd6;text-align:left}
  .hint b{color:#7fe3ff}
  .step{font-size:15px;text-align:left;margin:10px 16px;line-height:1.8}
</style>
</head>
<body>
  <h1>レト坊 新アイコン</h1>
  <p>下の画像を<b>長押し → 「写真に保存」</b>でカメラロールに保存してください。</p>
  <img class="icon" src="icon.png" alt="レト坊 新アイコン">
  <div class="hint">
    画像を<b>長押し</b>しても保存メニューが出ない時は、画像を<b>1回タップして大きく開いてから</b>長押ししてください。
  </div>
  <div class="step">
    保存できたら Threads で：<br>
    ① プロフィール →「プロフィールを編集」<br>
    ② 丸いアイコン写真をタップ<br>
    ③「新しい写真」→ 今保存したこの画像を選ぶ<br>
    ④ 位置を合わせて「完了 / 保存」
  </div>
</body>
</html>
